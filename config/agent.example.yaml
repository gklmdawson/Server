# Data Intake Agent configuration
# Copy to agent.yaml next to DataIntakeAgent.exe and adjust per machine.

node_name: TERRA-01
coordinator_url: http://192.168.35.25:8443

# The node's bearer token is read from this environment variable (set for the
# processing account by scripts/install_agent.ps1). Create the token with:
#   POST /api/v1/nodes  {"node_name": "TERRA-01", "capabilities": [...]}
token_env: DATA_INTAKE_NODE_TOKEN

# Job types this machine CAN run (apps installed here) — must match
# processors that exist. What it MAY run right now is managed centrally on
# the dashboard's Machines tab (effective = declared ∩ enabled there).
# INTAKE-01:  [INTAKE]                      (sees the ingest share / card reader)
# TERRA-01:   [TERRA_PPK, TERRA_LIDAR]
# PIX4D-01:   [PIX4D_MATIC]
# CYCLONE-01: [CYCLONE_CLASSIFY]
# A second Terra box is just another agent declaring the TERRA_* types.
capabilities:
  - TERRA_PPK
  - TERRA_LIDAR

# Agent-local working area: logs, per-job payload logs, failure bundles,
# and the crash-recovery state file. NOT project data (that stays on the NAS).
work_root: C:/ProgramData/DataIntakeAgent

# Desktop preflight for GUI-automation payloads. While these fail the agent
# pauses assignment (dashboard shows the reasons) instead of failing jobs.
require_dpi_150: true
expected_resolution: []        # e.g. [3840, 2160]; empty disables the check

# Payload/application locations, read by the processors. Only the keys for
# this machine's capabilities need to exist.
payload_paths:
  # INTAKE-01 (only needed when base data arrives as T02/T04)
  convert_to_rinex_exe: C:/Program Files (x86)/Trimble/convertToRINEX/convertToRinex.exe
  # TERRA-01
  dji_automate_ppk: Z:/Survey/UT/_Scripts/Automate UI/dist/DJI_AUTOMATE_PPK.exe
  dji_automate_ui: Z:/Survey/UT/_Scripts/Automate UI/dist/DJI_AUTOMATE_UI.exe
  # PIX4D-01
  pix4d_automate: Z:/Survey/UT/_Scripts/Automate UI/dist/PIX4D_AUTOMATE.exe
  # CYCLONE-01
  cyclone_3dr_exe: C:/Program Files/Leica Geosystems/Cyclone 3DR/3DR.exe
  cyclone_classify_script: Z:/Survey/UT/_Scripts/3DR/LAZ-Classify/ClassifyLAZ.js

# Local scratch drive for the Pix4D step (PIX4D-01 only). When set, the
# PIX4D_MATIC job copies the PPK folder (+ the TAT csv) here, runs Pix4Dmatic
# off this local disk instead of the AV-scanned NAS share, then copies the
# finished project back to the NAS and deletes the scratch copy. Use a fast
# local disk with room for one project's imagery + outputs. Leave empty (or
# omit) to run in place on the NAS, unchanged.
scratch_dir: ""                # e.g. D:/pix4d_scratch

keep_job_dirs_days: 7
request_timeout_seconds: 15
log_level: INFO
