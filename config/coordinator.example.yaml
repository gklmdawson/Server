# Data Intake Coordinator configuration
# Copy to coordinator.yaml next to the EXE (or pass --config / set
# DATA_INTAKE_COORDINATOR_CONFIG) and adjust.

host: 0.0.0.0
port: 8443

# SQLite file on the coordinator's LOCAL disk — never on the NAS/a share.
db_path: C:/ProgramData/DataIntakeCoordinator/data/coordinator.db

# Agents must present their per-node bearer token (create nodes + tokens with
# POST /api/v1/nodes). Set to false only during first bring-up.
require_agent_tokens: true

# Token for admin/intake endpoints (create projects/jobs, retry, cancel,
# node control). Prefer the DATA_INTAKE_ADMIN_TOKEN environment variable
# over putting it here.
admin_token: ""

# Scheduling / housekeeping
lease_minutes: 5              # ASSIGNED with no start report -> requeued
max_assign_attempts: 3        # lease strikes before NEEDS_ATTENTION
offline_after_seconds: 90     # node shown offline after this long without a sync
attention_after_seconds: 600  # RUNNING job on an offline node -> NEEDS_ATTENTION
stalled_after_seconds: 900    # dashboard-only "stalled?" flag
poll_idle_seconds: 10
poll_busy_seconds: 30

# Per-job-type runtime caps (minutes); the agent kills the payload past this.
default_max_runtime_minutes: 1440
job_max_runtime_minutes:
  INTAKE: 720
  TERRA_PPK: 720
  TERRA_LIDAR: 2880
  PIX4D_MATIC: 2880
  CYCLONE_CLASSIFY: 1440

# Defaults the web intake form pre-fills (GET /api/v1/intake/options).
intake_defaults:
  root_path: \\192.168.35.25\3dData
  epsg_h: ""
  epsg_v: ""
  # Cyclone 3DR classification models offered by the LiDAR chain dropdown.
  # Omit this key to fall back to the coordinator's built-in model list
  # (coordinator/intake.py: CLASSIFY_MODELS).
  classify_models:
    - BLK Mobile Filter People 2.0
    - Heavy Construction UAV 2.0
    - Indoor 2.2
    - Indoor Construction Site 1.3
    - Outdoor TLS 2.1
    - Plant 2.0
    - Road 1.0

# Roots the web form's Browse buttons can explore (GET /api/v1/browse).
# `path` is where the COORDINATOR sees the share (in Docker: a volume mount,
# see docker-compose.yml); `display` is the same location as agents address
# it — the picker writes display-form paths into job parameters. Omit or
# leave empty to hide the Browse buttons.
browse_roots:
  3dData:
    path: /mnt/3dData
    display: \\192.168.35.25\3dData
  # The card reader, mounted read-only (see docker-compose.yml).
  # `mounted_only` hides top-level device folders with no drive mounted on
  # them — the host keeps an (empty) mount-point folder for every USB device
  # it has ever seen, so without it Browse lists stale mounts. `ejectable`
  # adds an Eject button per device in the web picker (and implies
  # mounted_only); it needs eject_spool_dir below AND the host-side watcher
  # running (scripts/nas_eject_watcher.py).
  # ingest:
  #   path: /mnt/ingest
  #   display: /mnt/ingest
  #   mounted_only: true
  #   ejectable: true

# Media eject: the coordinator container can't unmount the NAS's cards, so it
# spools eject requests here for the host watcher to act on. Point it at a
# folder both the container and host see — a subdir of the /data volume works
# (container: /data/eject; host: <compose dir>/data/eject). Empty = disabled.
# eject_spool_dir: /data/eject

# Push alerts via ntfy (https://ntfy.sh). Empty topic = disabled. Subscribe to
# the topic in the ntfy app to get: job failed / needs attention (high
# priority), project complete + node offline (default), and silent chain
# progress / new intake ticks (low). The topic name is the only credential —
# prefer setting DATA_INTAKE_NTFY_TOPIC in .env (Docker) over this file, and
# generate an unguessable one:
#   python -c "import secrets; print('data-intake-' + secrets.token_urlsafe(24))"
# ntfy_server: https://ntfy.sh
# ntfy_topic: ""
# ntfy_token: ""     # only for a self-hosted server / reserved topic

# Workflow chain templates instantiated by POST /api/v1/projects.
templates:
  photo_ppk:
    - job_type: TERRA_PPK
    - job_type: PIX4D_MATIC
      depends_on: [TERRA_PPK]
  lidar:
    - job_type: TERRA_LIDAR
    - job_type: CYCLONE_CLASSIFY
      depends_on: [TERRA_LIDAR]

log_level: INFO
