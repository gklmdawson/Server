# Data Intake Coordinator on the UGREEN NAS (or any Docker host).
#
#   1. Put this repo folder somewhere on the NAS (e.g. /volume1/docker/data-intake)
#   2. cp .env.example .env   and set DATA_INTAKE_ADMIN_TOKEN
#   3. docker compose up -d --build
#
# The web UI + API are then at http://<nas-ip>:8443 — full steps in DEPLOY.md.

services:
  coordinator:
    build: .
    image: data-intake-coordinator:latest
    container_name: data-intake-coordinator
    ports:
      - "8443:8443"
    volumes:
      # SQLite DB, optional coordinator.yaml, and the uploads staging dir
      # (data/uploads) the browser drops base data / targets csv into. A path
      # on the NAS's own filesystem accessed locally — NOT SQLite over SMB.
      - ./data:/data
      # Data share for the web form's Browse buttons + the NAS helper's EXIF
      # probe (read-only — the coordinator LISTS and READS it; agents do the
      # writing). Must match a browse_roots `path` in coordinator.yaml.
      - /volume1/3dData:/mnt/3dData:ro
      # The card lands here when a crew plugs it into the NAS. Read-only: the
      # probe reads EXIF off it in place; the INTAKE_COPY worker copies from it.
      # UGOS mounts USB under /mnt/@usb/<device> (e.g. /mnt/@usb/sda1). Bind the
      # PARENT so any card/device shows up (as /mnt/ingest/sda1/...). `rslave`
      # propagation makes cards inserted AFTER container start appear live —
      # no restart needed (requires the host mount tree to be shared, the
      # systemd default; if a card ever doesn't show up, `compose restart`
      # remains the fallback).
      - /mnt/@usb:/mnt/ingest:ro,rslave
    environment:
      - DATA_INTAKE_ADMIN_TOKEN=${DATA_INTAKE_ADMIN_TOKEN:?set it in .env}
    restart: unless-stopped

  # The NAS-local half of the split intake: builds the folder tree and copies
  # card -> 3dData locally (no SMB round-trip), then leaves RINEX conversion to
  # the Windows RINEX_CONVERT worker. Same image as the coordinator, run as the
  # agent with capability INTAKE_COPY. Provision its node first (POST /nodes ->
  # token) and put the token in .env — see DEPLOY.md "Split intake".
  #
  # Opt-in via a profile so a plain `docker compose up` runs ONLY the
  # coordinator (and never blocks on this service's token). Start it with:
  #   docker compose --profile intake-copy up -d
  intake-copy:
    profiles: ["intake-copy"]
    build: .
    image: data-intake-coordinator:latest
    container_name: data-intake-copy
    command: ["data-intake-agent"]
    volumes:
      # Card (read-only): the copy READS the source here. UGOS mounts USB under
      # /mnt/@usb/<device>; bind the parent (card shows as /mnt/ingest/sda1/...).
      # rslave: hot-plugged cards propagate in without a restart (see above).
      - /mnt/@usb:/mnt/ingest:ro,rslave
      # Storage share (READ-WRITE): the copy WRITES the project tree here.
      - /volume1/3dData:/mnt/3dData
      # The uploaded base data / targets csv the coordinator wrote.
      - ./data/uploads:/data/uploads:ro
      # Agent work dir (state file, logs, job dirs) on the NAS volume.
      - ./data/intake-copy:/var/lib/data-intake-agent
    environment:
      - DATA_INTAKE_NODE_NAME=NAS-COPY
      - DATA_INTAKE_COORDINATOR_URL=http://coordinator:8443
      - DATA_INTAKE_CAPABILITIES=INTAKE_COPY
      - DATA_INTAKE_WORK_ROOT=/var/lib/data-intake-agent
      # Provision a node token (POST /nodes) and set DATA_INTAKE_COPY_TOKEN in
      # .env before starting this service. Empty default so it never blocks the
      # coordinator; the agent just can't authenticate until the token is set.
      - DATA_INTAKE_NODE_TOKEN=${DATA_INTAKE_COPY_TOKEN:-}
      # Rewrite the projects-root UNC in job parameters to this container's
      # mount. Only 3dData needs mapping: source folders are addressed by their
      # local /mnt/ingest path (the ingest browse root's `display` is the mount,
      # since only NAS containers read them) and uploaded base data is already a
      # /data/uploads path. Adjust the server IP to match your NAS.
      - DATA_INTAKE_PATH_MAP={"\\\\192.168.35.25\\3dData":"/mnt/3dData"}
    restart: unless-stopped
    depends_on: [coordinator]
